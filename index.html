<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuta - Bookstore Simulator</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 class="logo">Valuta</h1>
        <p class="subtitle">Bookstore</p>
    </header>

    <nav>
        <div class="nav-links">
            <a href="#">Início</a>
            <a href="#">Catálogo</a>
            <a href="#">Sobre a ADS</a>
        </div>
    </nav>

    <main class="container">
        <div class="section-header">
            <h2>Clássicos de Fiódor Dostoiévski</h2>
            <div class="line"></div>
        </div>
        
        <section class="livros-grid">
            <article class="card-livro">
                <div class="capa-container">
                    <img src="crime-e-castigo.webp" alt="Crime e Castigo">
                </div>
                <h3>Crime e Castigo</h3>
                <p class="autor">Fiódor Dostoiévski</p>
                <p class="preco">R$ 59,90</p>
                <button class="btn-comprar">Ver Detalhes</button>
            </article>

            <article class="card-livro">
                <div class="capa-container">
                    <img src="os-irmaos-karamazov.jpg" alt="Os Irmãos Karamazov">
                </div>
                <h3>Os irmaos karamazov.jpg</h3>
                <p class="autor">Fiódor Dostoiévski</p>
                <p class="preco">R$ 72,00</p>
                <button class="btn-comprar">Ver Detalhes</button>
            </article>

            <article class="card-livro">
                <div class="capa-container">
                    <img src="memorias-do-subsolo.jpg" alt="O Homem do Subsolo">
                </div>
                <h3>Memórias do Subsolo</h3>
                <p class="autor">Fiódor Dostoiévski</p>
                <p class="preco">R$ 45,00</p>
                <button class="btn-comprar">Ver Detalhes</button>
            </article>
        </section>
    </main>

    <footer>
        <p>Valuta Bookstore &copy; 2026</p>
        <p>Desenvolvido por <strong>Caique Soares</strong> - ADS</p>
    </footer>

</body>
</html>
