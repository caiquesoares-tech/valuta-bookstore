<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuta - Detalhes do Livro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@900&family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <span class="logo-destaque">V</span><span class="logo-texto">aluta</span>
        </a>
        <p class="subtitle">Bookstore</p>
    </header>

    <nav>
        <div class="nav-links">
            <div class="menu-principal">
                <a href="index.html">Início</a>
                <a href="carrinho.html" id="link-carrinho">CARRINHO (<span id="contagem-carrinho">0</span>)</a>
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar no acervo...">
                <i class="fas fa-search search-icon"></i>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="container-produto" id="detalhe-livro">
            
            <div class="produto-imagem">
                <img id="detalhe-imagem" src="" alt="Capa do Livro">
            </div>

            <div class="produto-info">
                <h1 id="detalhe-titulo"></h1> 
                <p class="produto-autor">
                    Por <span id="detalhe-autor"></span> 
                </p>

                <p id="detalhe-sinopse" class="sinopse-texto"></p> 
                
                <div class="compra-area">
                    <span class="preco-grande" id="detalhe-preco"></span> 
                    <button class="btn-comprar-grande">Adicionar ao Carrinho</button>
                </div>
            </div>
        </div>

        <section class="secao-autor">
            <div class="autor-container">
                <div class="autor-foto-wrapper">
                    <img id="autor-foto" src="" alt="Foto do Autor">
                </div>
                <div class="autor-detalhes">
                    <h3>Sobre o Autor</h3>
                    <h4 id="autor-nome-info"></h4>
                    <p id="autor-bio"></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-grid">
                <div class="footer-item">
                    <i class="fab fa-instagram"></i>
                    <span>@Valutabookstoreoficial</span>
                </div>
                <div class="footer-item">
                    <i class="fas fa-envelope"></i>
                    <span>contato@valutabookstore.com</span>
                </div>
                <div class="footer-item">
                    <i class="fas fa-phone"></i>
                    <span>(xx) 99899-218X</span>
                </div>
            </div>
            
            <div class="footer-line"></div>
            
            <div class="footer-bottom">
                <p>Valuta Bookstore &copy; 2026</p>
                <p class="dev-credito">Desenvolvido por <strong>Caique Soares</strong> - ADS</p>
            </div>
        </div>
    </footer>

    <script src="produto.js"></script>
</body>
</html>
